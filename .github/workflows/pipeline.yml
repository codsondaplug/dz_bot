name: CI Pipeline — Проверка качества кода и уведомление

on:
  pull_request:
    branches:
      - dev
  push:
    branches:
      - main

jobs:
  code-quality:
    name: Проверка качества кода
    runs-on: ubuntu-latest

    steps:
      - name: Шаг 1 — Скачивание исходного кода из репозитория
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Шаг 2 — Установка Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Шаг 3 — Компиляция Java кода
        run: |
          mkdir -p out
          javac -d out src/main/java/com/devops/bot/Main.java

      - name: Шаг 4 — Анализ кода через SonarCloud
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Шаг 5 — Сохранение отчёта как артефакт pipeline
        uses: actions/upload-artifact@v4
        with:
          name: sonar-report
          path: .scannerwork/report-task.txt
          retention-days: 7

  notify:
    name: Уведомление в Telegram
    runs-on: ubuntu-latest
    needs: code-quality
    if: always()

    steps:
      - name: Шаг 1 — Скачивание исходного кода из репозитория
        uses: actions/checkout@v4

      - name: Шаг 2 — Отправка уведомления в Telegram группу
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          chmod +x scripts/notify_telegram.sh
          bash scripts/notify_telegram.sh